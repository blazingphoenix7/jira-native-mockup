<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Jira — DDLNY Product Development</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="assets/app.css">
</head>
<body>

<!--
  Demo-mode switcher — NOT a native Jira feature.
  Real Jira users log in with their own account and only see what their
  permissions allow. This toggle is mockup-only, for colleague review.
-->
<div class="demo-mode-bar">
  <span class="demo-mode-tag">DEMO MODE</span>
  <span class="demo-mode-note">Not part of Jira. In production, each user sees what their own Jira account shows — there's no view-as toggle.</span>
  <label class="demo-mode-label">Preview as:</label>
  <select id="roleSelect" class="demo-mode-select">
    <option value="ddlny">Aaryan M. (DDLNY Admin)</option>
    <option value="dnj">Rajesh P. (DNJ vendor)</option>
    <option value="elegant">Priya S. (Elegant vendor)</option>
  </select>
</div>

<!-- ============ JIRA TOP NAV ============ -->
<header class="nav-top" role="banner">
  <div class="nav-top-left">
    <button class="nav-apps" title="Atlassian apps">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="5" r="2"/><circle cx="12" cy="5" r="2"/><circle cx="19" cy="5" r="2"/><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/><circle cx="5" cy="19" r="2"/><circle cx="12" cy="19" r="2"/><circle cx="19" cy="19" r="2"/></svg>
    </button>
    <a class="nav-logo" href="#">
      <span class="nav-logo-mark">
        <svg width="24" height="24" viewBox="0 0 24 24"><path fill="#2684FF" d="M12 0L3 9h6v6h6V9h6z"/><path fill="#0052CC" d="M12 24l9-9h-6V9H9v6H3z" opacity=".8"/></svg>
      </span>
      <span class="nav-logo-text">Jira</span>
    </a>
    <nav class="nav-items">
      <button class="nav-item" data-topnav="your-work">Your work <span class="nav-caret">▾</span></button>
      <button class="nav-item">Recent <span class="nav-caret">▾</span></button>
      <button class="nav-item">Starred <span class="nav-caret">▾</span></button>
      <button class="nav-item">Apps <span class="nav-caret">▾</span></button>
      <button class="nav-item">Plans <span class="nav-caret">▾</span></button>
      <button class="nav-item active" data-topnav="projects">Projects <span class="nav-caret">▾</span></button>
      <button class="nav-item" data-topnav="filters">Filters <span class="nav-caret">▾</span></button>
      <button class="nav-item" data-topnav="dashboards">Dashboards <span class="nav-caret">▾</span></button>
      <button class="nav-item">Teams <span class="nav-caret">▾</span></button>
    </nav>
    <button class="btn-create" onclick="openCreate()">Create</button>
  </div>

  <div class="nav-top-right">
    <div class="nav-search-wrap">
      <svg class="nav-search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
      <input class="nav-search" placeholder="Search" id="globalSearch"/>
    </div>
    <button class="nav-icon-btn" title="Atlassian Intelligence">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l2.39 7.36H22l-6.16 4.47L18.24 22 12 17.27 5.76 22l2.4-8.17L2 9.36h7.61z"/></svg>
    </button>
    <button class="nav-icon-btn" title="Notifications" data-notif-btn>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="nav-badge">0</span>
    </button>
    <button class="nav-icon-btn" title="Help">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    </button>
    <button class="nav-icon-btn" title="Settings">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
    <button class="nav-avatar" id="currentAvatar" title="Your profile">AM</button>
  </div>
</header>

<!-- ============ PROJECT LAYOUT ============ -->
<div class="proj-layout">

  <!-- Project sidebar -->
  <aside class="proj-sidebar" id="projSidebar">
    <!-- Rendered by JS: project switcher + nav list + shortcuts + settings -->
  </aside>

  <!-- Main content -->
  <main class="proj-main" id="projMain">
    <div class="loading">Loading…</div>
  </main>

</div>

<!-- ============ ISSUE DETAIL DRAWER ============ -->
<!--
  Jira's real pattern: clicking an issue card from a board opens a side-panel
  (not a full page). That's what this drawer mimics. The full-page issue view
  would be at /browse/DNJ-123.
-->
<div class="issue-drawer" id="issueDrawer">
  <div class="issue-drawer-backdrop" onclick="closeDrawer()"></div>
  <div class="issue-drawer-panel" id="issueDrawerPanel"></div>
</div>

<!-- ============ CREATE MODAL ============ -->
<div class="create-modal" id="createModal">
  <div class="create-modal-backdrop" onclick="closeCreate()"></div>
  <div class="create-modal-panel" id="createModalPanel"></div>
</div>

<!-- Status transition popover — positioned dynamically on status-button click -->
<div class="status-menu" id="statusMenu" style="display:none"></div>

<!-- Project switcher popover — appears when clicking the project name/avatar in the sidebar -->
<div id="projectSwitcherMenu" style="display:none"></div>

<!-- Notifications dropdown — populated on bell click -->
<div id="notificationsMenu" style="display:none"></div>

<script src="assets/app.js"></script>
</body>
</html>
